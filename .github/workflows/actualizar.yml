name: Actualizar EPG Personalizado

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4  # Actualizado a v4

      - name: Configurar Python
        uses: actions/setup-python@v5  # Actualizado a v5
        with:
          python-version: '3.x'

      - name: Instalar librerías
        run: pip install requests

      - name: Ejecutar script de filtrado
        run: python script.py

      - name: Guardar cambios en el repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add alvaroguia.xml
          git commit -m "EPG actualizado" || exit 0
          git push
